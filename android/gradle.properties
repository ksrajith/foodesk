# Gradle on low-memory Windows setups: smaller heap and non-G1 GC avoid G1 mark-stack mmap failures.
org.gradle.jvmargs=-Xms256m -Xmx1024m -XX:MaxMetaspaceSize=256m -XX:ReservedCodeCacheSize=96m -XX:+UseParallelGC -XX:+HeapDumpOnOutOfMemoryError
# Reduce parallel pressure to lower peak native memory usage.
org.gradle.workers.max=2
# Kotlin compiler runs in a separate daemon; cap it so it does not compete with Gradle for RAM.
kotlin.daemon.jvmargs=-Xmx768m
android.useAndroidX=true
android.enableJetifier=true
# Avoid Kotlin incremental cache errors when project is on D: and Pub cache on C:
kotlin.incremental=false
